[platformio]
default_envs = m5dial

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags =
  -D SERIAL_BAUD=115200
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  bblanchon/ArduinoJson@^7.4.2

[env:m5dial]
; M5Stack Dial is based on M5StampS3. If PlatformIO board support differs
; on the build host, this can be changed to a compatible ESP32-S3 board id.
board = m5stack-stamps3
build_flags =
  ${env.build_flags}
  -D TARGET_M5DIAL=1
lib_deps =
  ${env.lib_deps}
  m5stack/M5Dial@^1.0.3
